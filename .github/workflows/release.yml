name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and Publish Release
    runs-on: ubuntu-latest
    env:
      FILE_NAME: ""
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            suffix: linux-amd64
          - os: windows
            arch: amd64
            suffix: windows-amd64.exe
          - os: darwin
            arch: amd64
            suffix: mac-amd64
          - os: darwin
            arch: arm64
            suffix: mac-arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build frontend
        working-directory: ./web
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Build Go binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          # If triggered by a tag (v0.6.3), use it. Otherwise, fallback to 'dev'.
          VERSION: ${{ github.ref_type == 'tag' && github.ref_name || 'dev' }}
        run: |
          FILE_NAME="pulse-${VERSION}-${{ matrix.suffix }}"
          go build -ldflags="-s -w" -o $FILE_NAME ./cmd/server
          echo "FILE_NAME=$FILE_NAME" >> $GITHUB_ENV

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.FILE_NAME }}
          # Ensure manual dispatches don't accidentally attach to an old tag
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
