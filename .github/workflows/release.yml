name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  binaries:
    name: Build and Publish Binaries
    runs-on: ubuntu-latest
    env:
      FILE_NAME: ""
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            suffix: linux-amd64
          - os: windows
            arch: amd64
            suffix: windows-amd64.exe
          - os: darwin
            arch: amd64
            suffix: mac-amd64
          - os: darwin
            arch: arm64
            suffix: mac-arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build frontend
        working-directory: ./web
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Build Go binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          VERSION: ${{ github.ref_type == 'tag' && github.ref_name || 'dev' }}
        run: |
          FILE_NAME="pulse-${VERSION}-${{ matrix.suffix }}"
          COMMIT=$(git rev-parse --short HEAD)
          go build -ldflags="-s -w -X github.com/divijg19/Pulse/internal/version.Version=${VERSION} -X github.com/divijg19/Pulse/internal/version.Commit=${COMMIT}" -o $FILE_NAME ./cmd/pulse
          echo "FILE_NAME=$FILE_NAME" >> $GITHUB_ENV

      - name: Generate checksum
        run: sha256sum ${{ env.FILE_NAME }} > ${{ env.FILE_NAME }}.sha256

      - name: Upload release asset
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          # Label the release exactly with the tag version (no project prefix)
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: |
            ${{ env.FILE_NAME }}
            ${{ env.FILE_NAME }}.sha256
          append_body: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Build and Publish Docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser (Docker Publish Only)
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          # The GitHub Release step is disabled in .goreleaser.yml
          # (release.disable: true) so GoReleaser only builds and publishes
          # the Docker image, avoiding conflict with the manual binaries release.
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
